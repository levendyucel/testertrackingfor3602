<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6HKT43MP20"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6HKT43MP20');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tester Tracking 3602</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl mt-6 relative">
        
        <div class="absolute top-4 right-4">
            <select id="langSelect" onchange="changeLang()" class="bg-gray-100 text-xs border rounded p-1 outline-none font-bold">
                <option value="en">EN 🇺🇸</option>
                <option value="tr">TR 🇹🇷</option>
                <option value="es">ES 🇪🇸</option>
            </select>
        </div>

        <h1 class="text-xl font-black text-center mb-8 text-indigo-700 tracking-tighter pt-4 uppercase">Tester Tracking 3602</h1>

        <div id="step-1">
            <label id="lbl-sicil" class="block mb-2 font-bold text-gray-600 text-xs uppercase">Staff ID Number</label>
            <input type="number" id="sicil" class="w-full border-2 border-gray-100 p-4 rounded-xl mb-4 outline-none focus:border-indigo-500 text-lg shadow-sm" placeholder="...">
            <button id="btn-login" onclick="nextStep(2)" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition text-lg uppercase">Login</button>
            
            <div class="mt-8 text-center border-t pt-4">
                <a href="https://docs.google.com/spreadsheets/d/1B-lO6XInG1f7-Qat_vTjG7F9e5p9A2_Xm9Zz7M0V1Yk/edit?usp=sharing" target="_blank" class="text-indigo-500 text-xs font-bold flex items-center justify-center gap-2">
                    📊 <span id="lbl-view-sheet">View Spreadsheet Records</span>
                </a>
            </div>
        </div>

        <div id="step-2" class="hidden text-center">
            <p id="lbl-dept" class="mb-6 font-bold text-gray-400 uppercase text-sm">Select Department</p>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="setDept('WOMAN')" class="bg-pink-500 text-white py-8 rounded-3xl font-black text-2xl shadow-md active:scale-95 transition uppercase">WOMAN</button>
                <button onclick="setDept('MAN')" class="bg-blue-600 text-white py-8 rounded-3xl font-black text-2xl shadow-md active:scale-95 transition uppercase">MAN</button>
                <button onclick="setDept('KIDS')" class="bg-orange-500 text-white py-8 rounded-3xl font-black text-2xl shadow-md active:scale-95 transition uppercase font-black uppercase">KIDS</button>
            </div>
        </div>

        <div id="step-3" class="hidden text-center">
            <h2 id="selected-dept" class="text-xl font-black mb-8 text-indigo-800 bg-indigo-50 py-3 rounded-xl uppercase tracking-tighter"></h2>
            <button id="btn-all-ok" onclick="finalSend('Full')" class="w-full bg-green-500 text-white py-6 rounded-2xl font-black text-xl mb-6 shadow-lg active:scale-95 transition italic uppercase">All Testers Full ✓</button>
            <div class="border-t pt-6">
                <button id="btn-missing" onclick="nextStep(4)" class="w-full bg-red-500 text-white py-4 rounded-xl font-bold uppercase text-sm active:scale-95 transition tracking-tight">Testers Missing / Merma</button>
            </div>
        </div>

        <div id="step-4" class="hidden">
            <h3 id="lbl-report" class="font-bold mb-4 text-red-600 uppercase text-[10px] text-center tracking-widest">Product Report Details</h3>
            <input type="text" id="parfum-ad" class="w-full border-2 border-gray-100 p-4 rounded-xl mb-3 outline-none focus:border-orange-500 shadow-inner" placeholder="...">
            <select id="sebep" class="w-full border-2 border-gray-100 p-4 rounded-xl mb-4 bg-gray-50 font-bold text-gray-700">
                <option value="Finished" id="opt-finished">FINISHED / REPLACED</option>
                <option value="MERMA" id="opt-merma">MERMA (LOST/STOLEN)</option>
            </select>
            <button id="btn-add" onclick="addItem()" class="w-full border-2 border-orange-400 text-orange-600 py-3 rounded-xl font-bold mb-6 active:scale-95 transition uppercase text-xs">+ Add to List</button>
            <div id="list-container" class="mb-6 space-y-2 max-h-48 overflow-y-auto"></div>
            <button id="btn-complete" onclick="finalSend('Missing')" class="w-full bg-black text-white py-5 rounded-2xl font-black shadow-2xl active:scale-95 transition uppercase">Complete & Send</button>
        </div>

        <div id="loading" class="hidden text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-700 mx-auto mb-4"></div>
            <p id="lbl-loading" class="text-indigo-700 font-bold italic">Sending...</p>
        </div>

        <div id="step-finish" class="hidden text-center py-12">
            <div id="lbl-success-icon" class="text-green-500 text-6xl mb-4 font-black">DONE</div>
            <p id="lbl-success-text" class="text-gray-500 font-medium italic">Sent to central database.</p>
            <button id="btn-new" onclick="location.reload()" class="mt-10 text-indigo-600 font-bold border-b-2 border-indigo-600 pb-1 uppercase text-xs">New Check</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsYJijXJH3tmxZvZKfyhb9cq1L1qfEJE-lIVXZpjzU00mcAUzYMR5ipf787QneLbaaPg/exec';
        let state = { sicil: '', dept: '', time: '', items: [], lang: 'en' };

        const translations = {
            en: {
                sicil: "Staff ID Number", login: "LOGIN", dept: "Select Department",
                all_ok: "ALL TESTERS FULL ✓", missing: "Testers Missing / Merma",
                report: "Product Report Details", finished: "FINISHED / REPLACED",
                merma: "MERMA (LOST/STOLEN)", add: "+ ADD TO LIST",
                complete: "COMPLETE & SEND", loading: "Sending...",
                success_icon: "DONE", success_text: "Sent to central database.",
                new: "NEW CHECK", alert_id: "Enter ID!", alert_name: "Enter product!",
                view_sheet: "View Spreadsheet Records"
            },
            tr: {
                sicil: "Personel Sicil No", login: "GİRİŞ YAP", dept: "Departman Seçiniz",
                all_ok: "TÜM TESTERLAR TAM ✓", missing: "Eksik / Merma Bildir",
                report: "Ürün Bildirim Detayı", finished: "BİTTİ / YENİLENDİ",
                merma: "MERMA (KAYIP / ÇALINTI)", add: "+ LİSTEYE EKLE",
                complete: "KAYDI TAMAMLA", loading: "Gönderiliyor...",
                success_icon: "TAMAM", success_text: "Kayıt merkeze iletildi.",
                new: "YENİ KONTROL", alert_id: "Sicil girin!", alert_name: "Ürün adı girin!",
                view_sheet: "E-Tablo Kayıtlarını Görüntüle"
            },
            es: {
                sicil: "Número de ID Personal", login: "ACCESO", dept: "Seleccionar Departamento",
                all_ok: "PROBADORES COMPLETOS ✓", missing: "Faltantes / Merma",
                report: "Detalles del Informe", finished: "REEMPLAZADO",
                merma: "MERMA (PERDIDO/ROBADO)", add: "+ AGREGAR A LISTA",
                complete: "COMPLETAR Y ENVIAR", loading: "Enviando...",
                success_icon: "LISTO", success_text: "Enviado con éxito.",
                new: "NUEVO CONTROL", alert_id: "¡Ingrese ID!", alert_name: "¡Ingrese nombre!",
                view_sheet: "Ver Registros de Hoja"
            }
        };

        function changeLang() {
            state.lang = document.getElementById('langSelect').value;
            const t = translations[state.lang];
            document.getElementById('lbl-sicil').innerText = t.sicil;
            document.getElementById('btn-login').innerText = t.login;
            document.getElementById('lbl-dept').innerText = t.dept;
            document.getElementById('btn-all-ok').innerText = t.all_ok;
            document.getElementById('btn-missing').innerText = t.missing;
            document.getElementById('lbl-report').innerText = t.report;
            document.getElementById('opt-finished').innerText = t.finished;
            document.getElementById('opt-merma').innerText = t.merma;
            document.getElementById('btn-add').innerText = t.add;
            document.getElementById('btn-complete').innerText = t.complete;
            document.getElementById('lbl-loading').innerText = t.loading;
            document.getElementById('lbl-success-icon').innerText = t.success_icon;
            document.getElementById('lbl-success-text').innerText = t.success_text;
            document.getElementById('btn-new').innerText = t.new;
            document.getElementById('lbl-view-sheet').innerText = t.view_sheet;
        }

        function nextStep(s) {
            if(s === 2 && !document.getElementById('sicil').value) return alert(translations[state.lang].alert_id);
            document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('step-'+s).classList.remove('hidden');
            if(s === 2) state.sicil = document.getElementById('sicil').value;
        }

        function setDept(d) {
            state.dept = d;
            document.getElementById('selected-dept').innerText = "📍 " + d;
            nextStep(3);
        }

        function addItem() {
            const n = document.getElementById('parfum-ad').value;
            const r = document.getElementById('sebep').value;
            if(!n) return alert(translations[state.lang].alert_name);
            state.items.push({ name: n, reason: r });
            const div = document.createElement('div');
            div.className = "bg-gray-50 p-3 rounded-lg flex justify-between items-center border-l-4 " + (r === 'MERMA' ? 'border-red-500' : 'border-indigo-400');
            div.innerHTML = `<span class="font-bold text-sm">${n}</span><span class="text-[10px] bg-white px-2 py-1 rounded shadow-sm font-black uppercase">${r}</span>`;
            document.getElementById('list-container').prepend(div);
            document.getElementById('parfum-ad').value = '';
        }

        async function finalSend() {
            state.time = new Date().toLocaleString('tr-TR');
            document.querySelectorAll('#app > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('loading').classList.remove('hidden');

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(state)
                });
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('step-finish').classList.remove('hidden');
            } catch (err) {
                alert("Internet Error!");
                nextStep(1);
            }
        }
    </script>
</body>
</html>
